<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Australian Citizenship Test</title>
  <script>
    // SPA redirect for GitHub Pages (https://github.com/rafgraph/spa-github-pages)
    // Keep 1 path segment (/CitizenshipTest/) when redirecting
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.host + '/' +
      l.pathname.split('/').slice(0, 2).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(1).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
